<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Результат</title>
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/result.css">
</head>
<body>

<header class="header">
    <div class="container">
        <div class="logo">
            <img src="../static/images/logo.png" alt="Логотип">
        </div>
    </div>
</header>

<main class="result-page">
    <div class="container">
        <div class="result-image">
            <img src="../static/images/question_marks.png" alt="Вопросы">
        </div>
        <div class="result-title big-title">
            Ура! Ты прошёл тест! <span>Твой результат:</span>
        </div>
        <div class="result-score" id="result-score">
            4/5
        </div>
        <div class="right-answer">
            <a href="#/answer" id="answer">
                Посмотреть правильные ответы
                <img src="../static/images/small-arrow.png" alt="Стрелочка">
            </a>
        </div>
    </div>
</main>

<footer class="footer">
    «АйтилогияQuiz» © Все права защищены / 2022
</footer>

<script src="../src/components/result.js"></script>

</body>
</html>
